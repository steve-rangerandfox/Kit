# Kit Bolt — Railway Configuration
# Persistent Slack bot via Socket Mode (WebSocket, not HTTP)
# No need for a public port — Socket Mode connects outbound to Slack

[build]
# Dockerfile is in bolt/ but context must be repo root
# to access shared code in src/lib/
builder = "DOCKERFILE"
dockerfilePath = "bolt/Dockerfile"

[deploy]
numReplicas = 1
restartPolicyType = "ALWAYS"
# Deploy gate: the app's /health endpoint reports real Slack connectivity
# (auth.test watchdog) instead of the old always-200 fallback.
healthcheckPath = "/health"

# No sleep — Kit must be online 24/7
sleepApplication = false
